<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Lime Green Rounded Square -->
  <rect width="512" height="512" rx="40" fill="#84cc16"/>
  
  <g transform="translate(256, 260)">
    <!-- Ears -->
    <rect x="-110" y="-140" width="44" height="44" rx="10" fill="#09090b"/>
    <rect x="-105" y="-135" width="22" height="22" rx="5" fill="#84cc16"/>
    <rect x="66" y="-140" width="44" height="44" rx="10" fill="#09090b"/>
    <rect x="83" y="-135" width="22" height="22" rx="5" fill="#84cc16"/>
    
    <!-- Head -->
    <rect x="-115" y="-90" width="230" height="230" rx="25" fill="#09090b"/>
    
    <!-- Snout -->
    <rect x="-42" y="38" width="84" height="62" rx="16" fill="#84cc16"/>
    
    <!-- Nose -->
    <rect x="-10" y="28" width="20" height="14" rx="7" fill="#09090b"/>
    
    <!-- Eyes -->
    <rect x="-52" y="-12" width="32" height="32" rx="8" fill="#84cc16"/>
    <circle cx="-36" cy="4" r="6" fill="#09090b"/>
    <circle cx="-39" cy="0" r="2.5" fill="white"/>
    
    <rect x="20" y="-12" width="32" height="32" rx="8" fill="#84cc16"/>
    <circle cx="36" cy="4" r="6" fill="#09090b"/>
    <circle cx="33" cy="0" r="2.5" fill="white"/>
    
    <!-- Mouth -->
    <path d="M-12,62 Q0,76 12,62" fill="none" stroke="#09090b" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Bounce -->
    <animateTransform attributeName="transform" type="translate" values="256,260; 256,250; 256,260" dur="2.5s" repeatCount="indefinite"/>
  </g>
</svg>