<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Lime Green Background -->
  <rect width="512" height="512" rx="120" fill="#84cc16"/>
  
  <!-- Fox Ears -->
  <path d="M130 180 L170 60 L230 160 Z" fill="#18181b"/>
  <path d="M382 180 L342 60 L282 160 Z" fill="#18181b"/>
  
  <!-- Ear Inner (lighter for depth) -->
  <path d="M148 170 L173 85 L215 158 Z" fill="#27272a"/>
  <path d="M364 170 L339 85 L297 158 Z" fill="#27272a"/>
  
  <!-- Fox Face -->
  <ellipse cx="256" cy="290" rx="140" ry="120" fill="#18181b"/>
  
  <!-- Face Bottom (snout area) -->
  <ellipse cx="256" cy="350" rx="90" ry="60" fill="#27272a"/>
  <ellipse cx="256" cy="345" rx="88" ry="58" fill="#3f3f46"/>
  
  <!-- Eyes -->
  <ellipse cx="210" cy="270" rx="18" ry="22" fill="#84cc16"/>
  <ellipse cx="302" cy="270" rx="18" ry="22" fill="#84cc16"/>
  
  <!-- Eye Pupils -->
  <ellipse cx="210" cy="270" rx="10" ry="14" fill="#18181b"/>
  <ellipse cx="302" cy="270" rx="10" ry="14" fill="#18181b"/>
  
  <!-- Eye Shine -->
  <circle cx="216" cy="264" r="5" fill="white"/>
  <circle cx="308" cy="264" r="5" fill="white"/>
  
  <!-- Nose -->
  <circle cx="256" cy="320" r="12" fill="#18181b"/>
  <circle cx="252" cy="317" r="4" fill="white" opacity="0.4"/>
  
  <!-- Mouth -->
  <path d="M248 334 Q256 348 264 334" fill="none" stroke="#18181b" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Eyebrows (adds character) -->
  <path d="M190 245 Q210 235 230 245" fill="none" stroke="#18181b" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <path d="M282 245 Q302 235 322 245" fill="none" stroke="#18181b" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
</svg>